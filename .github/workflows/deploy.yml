name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    env:
      VITE_APOD_PROXY_URL: ${{ secrets.VITE_APOD_PROXY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check NASA proxy URL secret
        run: |
          if [ -z "$VITE_APOD_PROXY_URL" ]; then
            echo "Missing required repository secret: VITE_APOD_PROXY_URL"
            exit 1
          fi

      - name: Validate
        run: npm run validate

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure authenticated remote
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to gh-pages
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
